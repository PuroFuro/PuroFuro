name: Metrics
on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"   # daily
jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          template: terminal
          filename: metrics.svg

          # Only include this block once you've actually starred enough repos
          # plugin_topics: yes
          # plugin_topics_mode: starred

          plugin_languages: yes
          plugin_lines: yes
          plugin_habits: yes